name: Rebuild Outline review queue
# Runs hourly, and can also be triggered by hand from the Actions tab.
on:
  schedule:
    - cron: "17 * * * *"   # 17 past every hour, UTC, off the contended top of the hour
  workflow_dispatch: {}
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python review_queue.py
        env:
          OUTLINE_URL: ${{ secrets.OUTLINE_URL }}
          OUTLINE_API_KEY: ${{ secrets.OUTLINE_API_KEY }}
          QUEUE_SHIPPED_DAYS: ${{ secrets.QUEUE_SHIPPED_DAYS }}
